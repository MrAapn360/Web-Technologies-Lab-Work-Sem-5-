<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Welcome Back</title>
  <link rel="stylesheet" href="login.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <!-- Boxicons for icons -->
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
</head>
<body>

  <div class="page-wrapper">

    <!-- Background image overlay -->
    <div class="bg-overlay"></div>

    <!-- Login card -->
    <div class="card">

      <!-- Lock icon -->
      <div class="icon-circle">
        <i class="bx bxs-lock-alt"></i>
      </div>

      <h1 class="card-title">Welcome Back!</h1>
      <p class="card-subtitle">Please login to your account</p>

      <!-- Email field -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <i class="bx bx-envelope input-icon"></i>
          <input type="email" id="email" placeholder="Enter your email" autocomplete="off"/>
        </div>
      </div>

      <!-- Password field -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <i class="bx bxs-lock-alt input-icon"></i>
          <input type="password" id="password" placeholder="Enter your password"/>
          <button type="button" class="toggle-pw" onclick="togglePassword('password', this)" aria-label="Show password">
            <i class="bx bx-show"></i>
          </button>
        </div>
      </div>

      <!-- Remember me + Forgot -->
      <div class="row-between">
        <label class="checkbox-label">
          <input type="checkbox" id="remember" checked/>
          <span class="checkmark"></span>
          Remember me
        </label>
        <a href="#" class="link">Forgot Password?</a>
      </div>

      <!-- Login button -->
      <button class="btn-primary" type="button">Login</button>

      <!-- Divider -->
      <div class="divider"><span>OR</span></div>

      <!-- Google button -->
      <button class="btn-google" type="button">
        <svg class="google-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <!-- Register link -->
      <p class="bottom-text">
        Don't have an account? <a href="register.html" class="link">Register here</a>
      </p>

    </div>

    <!-- Footer -->
    <footer>© 2024 Your Company. All rights reserved.</footer>

  </div>

  <script>
    function togglePassword(fieldId, btn) {
      const input = document.getElementById(fieldId);
      const icon  = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('bx-show', 'bx-hide');
      } else {
        input.type = 'password';
        icon.classList.replace('bx-hide', 'bx-show');
      }
    }
  </script>

</body>
</html>
